                        <button type="button" class="details-toggle" data-details-toggle aria-expanded="false">
                            <span data-details-label>Ver detalles</span>
                            <span class="chev">▾</span>
                        </button>
                        <div class="center-body">
                            <div class="product-position">Producto ${idx + 1} de ${total}</div>
                            <div class="name">${escapeHtml(current.name || "Producto")}</div>
                            <div class="meta">${escapeHtml(current.description || "Producto disponible")}</div>
                            <div class="product-facts">
                                <div><strong>Capacidad de cobertura:</strong> ${escapeHtml(current.coverage || "No especificada")}</div>
                                <div><strong>Tipo:</strong> ${escapeHtml(current.type || "No especificado")}</div>
                            </div>
                        </div>
                    </article>

                    <article class="cover-card side" role="button" tabindex="0" onclick="nextCatalogProduct()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();nextCatalogProduct();}">
                        <img class="catalog-image" src="${escapeHtml(imageFor(next))}" alt="${escapeHtml(next.name || "Producto siguiente")}" />
                        <div class="name">${escapeHtml(next.name || "Siguiente")}</div>
                    </article>
                </div>
                <div class="swipe-hint">Desliza, usa las flechas o ← → del teclado para cambiar de producto</div>
            `;
            attachCoverflowSwipe(root);
            attachDetailsReveal(root);
        }

        function attachDetailsReveal(root) {
            const card = root.querySelector("[data-center-card]");
            if (!card) return;
            const toggle = card.querySelector("[data-details-toggle]");
            const label = card.querySelector("[data-details-label]");
            const setOpen = (open) => {
                card.classList.toggle("details-open", open);
                if (toggle) toggle.setAttribute("aria-expanded", open ? "true" : "false");
                if (label) label.textContent = open ? "Ocultar detalles" : "Ver detalles";
            };
            if (toggle) {
                toggle.addEventListener("click", (ev) => {
                    ev.stopPropagation();
                    setOpen(!card.classList.contains("details-open"));
                });
            }
            // Abrir con scroll/swipe vertical dentro de la card (móvil y desktop)
            let acc = 0;
            let lastY = null;
            card.addEventListener("wheel", (ev) => {
                if (card.classList.contains("details-open")) return;
                if (ev.deltaY > 6) { ev.preventDefault(); setOpen(true); }
            }, { passive: false });
            card.addEventListener("touchstart", (ev) => {
                if (ev.touches && ev.touches[0]) lastY = ev.touches[0].clientY;
                acc = 0;
            }, { passive: true });
            card.addEventListener("touchmove", (ev) => {
                if (card.classList.contains("details-open")) return;
                if (!ev.touches || !ev.touches[0] || lastY == null) return;
                const y = ev.touches[0].clientY;
                acc += (lastY - y);
                lastY = y;
                if (acc > 28) setOpen(true);
            }, { passive: true });
        }

        function attachCoverflowSwipe(root) {
            const track = root.querySelector("[data-coverflow-track]");
            if (!track) return;
            let startX = 0;
            let startY = 0;
            let dx = 0;
            let active = false;
            let pointerId = null;
            const THRESHOLD = 50;
            const MAX_TRANSLATE = 120;

            const reset = () => {
                root.classList.remove("is-swiping");
                track.style.transform = "";
                active = false;
                pointerId = null;
                dx = 0;
            };

            track.addEventListener("pointerdown", (ev) => {
                if (ev.pointerType === "mouse" && ev.button !== 0) return;
                active = true;
                pointerId = ev.pointerId;
                startX = ev.clientX;
                startY = ev.clientY;
                dx = 0;
                root.classList.add("is-swiping");
                try { track.setPointerCapture(ev.pointerId); } catch (_) {}
            });

            track.addEventListener("pointermove", (ev) => {
                if (!active || ev.pointerId !== pointerId) return;
                const cdx = ev.clientX - startX;
                const cdy = ev.clientY - startY;
                if (Math.abs(cdy) > Math.abs(cdx) && Math.abs(cdy) > 16) {
                    reset();
                    return;
                }
                dx = Math.max(-MAX_TRANSLATE, Math.min(MAX_TRANSLATE, cdx));
                track.style.transform = `translateX(${dx}px)`;
            });

            const finish = (ev) => {
                if (!active || (ev && ev.pointerId !== pointerId)) return;
                const moved = dx;
                reset();
                if (moved <= -THRESHOLD) {
                    nextCatalogProduct();
                } else if (moved >= THRESHOLD) {
                    prevCatalogProduct();
                }
            };

            track.addEventListener("pointerup", finish);
            track.addEventListener("pointercancel", finish);
            track.addEventListener("pointerleave", finish);
        }

        // Navegación con teclado (PC): ← → cuando se muestra el paso de producto
        document.addEventListener("keydown", (ev) => {
            if (ev.key !== "ArrowLeft" && ev.key !== "ArrowRight") return;
            const productStep = document.getElementById("productStep");
            if (!productStep || productStep.classList.contains("hidden")) return;
            const tag = (ev.target && ev.target.tagName) || "";
            if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
            ev.preventDefault();
            if (ev.key === "ArrowLeft") prevCatalogProduct(); else nextCatalogProduct();
        });

        function prevCatalogProduct() {
            if (!state.catalog.length) return;
            state.selectedCatalogIndex = (state.selectedCatalogIndex - 1 + state.catalog.length) % state.catalog.length;
            renderCatalog();
        }

        function nextCatalogProduct() {
            if (!state.catalog.length) return;
            state.selectedCatalogIndex = (state.selectedCatalogIndex + 1) % state.catalog.length;
            renderCatalog();
        }

        function selectColor(index) {
            state.selectedColorIndex = index;
            state.selectedCatalogIndex = 0;
            renderSelectedColorStrip();
            renderCatalog();
            setFlowStep("product");
        }

        function backToColorStep() {
            setFlowStep("color");
            setStatus("Selecciona un color para continuar.", "info");
        }

        function goHomeFromLogo(event) {
            if (event) event.preventDefault();
            if (!confirm("¿Cerrar sesión y salir del modo cliente?")) return;
            try {
                localStorage.removeItem("currentUser");
            } catch (_) {}
            window.location.href = "/";
        }

        function refreshChooserOptions(productName) {
            const term = document.getElementById("chooserTerminacion");
            const pres = document.getElementById("chooserPresentacion");
            const terms = getTerminaciones(productName);
            const preses = getPresentaciones(productName);

            term.innerHTML = terms.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
            pres.innerHTML = preses.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");

            term.value = terms.includes(state.chooserDefaults.terminacion) ? state.chooserDefaults.terminacion : terms[0];
            pres.value = preses.includes(state.chooserDefaults.presentacion) ? state.chooserDefaults.presentacion : preses[0];
        }

        function openChooser(index) {
            const color = state.colors[state.selectedColorIndex];
            const product = state.catalog[index];
            if (!color || !product) return;

            state.selectedCatalogIndex = index;
            document.getElementById("chooserTitle").textContent = product.name || "Producto";
            document.getElementById("chooserSub").textContent = `Color: ${color.codigo || ""} - ${color.nombre || ""}`;
            document.getElementById("chooserSummary").innerHTML = `
                <div><strong>Producto:</strong> ${escapeHtml(product.name || "Producto")}</div>
                <div><strong>Color:</strong> ${escapeHtml(`${color.codigo || ""} - ${color.nombre || ""}`)}</div>
                <div><strong>Cobertura:</strong> ${escapeHtml(product.coverage || "No especificada")}</div>
                <div><strong>Tipo:</strong> ${escapeHtml(product.type || "No especificado")}</div>
            `;
            document.getElementById("chooserCantidad").value = String(state.chooserDefaults.cantidad || 1);
            refreshChooserOptions(product.name || "");
            document.getElementById("chooserOverlay").classList.add("active");
        }

        function closeProductChooser(event) {
            if (event && event.target && event.target.id !== "chooserOverlay") return;
            document.getElementById("chooserOverlay").classList.remove("active");
        }

        function openCheckoutModal() {
            document.getElementById("checkoutOverlay").classList.add("active");
        }

        function closeCheckoutModal(event) {
            if (event && event.target && event.target.id !== "checkoutOverlay") return;
            document.getElementById("checkoutOverlay").classList.remove("active");
        }

        function openCartDrawer() {
            document.getElementById("cartDrawerOverlay").classList.add("active");
        }

        function closeCartDrawer(event) {
            if (event && event.target && event.target.id !== "cartDrawerOverlay") return;
            document.getElementById("cartDrawerOverlay").classList.remove("active");
        }

        function confirmProductChooser() {
            const color = state.colors[state.selectedColorIndex];
            const product = state.catalog[state.selectedCatalogIndex];
            if (!color || !product) {
                closeProductChooser();
                return;
            }

            const terminacion = (document.getElementById("chooserTerminacion").value || "Mate").trim();
            const presentacion = (document.getElementById("chooserPresentacion").value || "Galon").trim();
            const prioridad = "Media";
            const cantidad = Math.max(1, Number(document.getElementById("chooserCantidad").value || 1));

            state.chooserDefaults = { terminacion, presentacion, prioridad, cantidad };

            const existing = state.cart.find(it =>
                it.codigo === color.codigo &&
                it.producto === (product.name || "Producto") &&
                it.terminacion === terminacion &&
                it.presentacion === presentacion &&
                it.prioridad === prioridad
            );

            if (existing) {
                existing.cantidad += cantidad;
            } else {
                state.cart.push({
                    codigo: color.codigo,
                    descripcion: color.nombre || color.codigo || "",
                    producto: product.name || "Producto",
                    terminacion,
                    presentacion,
                    prioridad,
                    cantidad,
                    base: color.base || "",
                    ubicacion: color.ubicacion || ""
                });
            }

            renderCart();
            closeProductChooser();
            setFlowStep("color");
            const queryInput = document.getElementById("kioskQuery");
            if (queryInput) queryInput.value = "";
            loadColorList();
            setStatus("Producto agregado al carrito.", "ok");
        }

        function cartTotalItems() {
            return state.cart.reduce((acc, it) => acc + Number(it.cantidad || 0), 0);
        }

        function renderCartPreview() {
            const root = document.getElementById("cartPreviewList");
            if (!root) return;

            if (!state.cart.length) {
                root.innerHTML = '<div class="cart-preview-empty">No hay productos en el carrito.</div>';
                return;
            }

            const items = state.cart.slice(0, 4);
            root.innerHTML = items.map((item) => `
                <div class="cart-preview-item">
                    <div><strong>${escapeHtml(item.producto || "Producto")}</strong></div>
                    <div>${escapeHtml(item.codigo || "-")} | x${Number(item.cantidad || 1)} ${escapeHtml(String(item.presentacion || "").toLowerCase() || "unidad")}</div>
                </div>
            `).join("");

            if (state.cart.length > 4) {
                root.innerHTML += `<div class="cart-preview-empty">+${state.cart.length - 4} productos mas...</div>`;
            }
        }

        function updateCartTotal() {
            const total = String(cartTotalItems());
            const el = document.getElementById("cartTotalItems");
            const drawerEl = document.getElementById("cartDrawerTotal");
            if (el) el.textContent = total;
            if (drawerEl) drawerEl.textContent = total;
            renderCartPreview();
        }

        function renderCart() {
            const root = document.getElementById("cart");
            if (!root) return;
            if (!state.cart.length) {
                root.innerHTML = "<div class=\"cart-item\">No hay productos en el carrito</div>";
                updateCartTotal();
                return;
            }

            root.innerHTML = state.cart.map((item, idx) => `
                <div class="cart-item">
                    <div><strong>${escapeHtml(item.producto)}</strong> <span class="code">${escapeHtml(item.codigo)}</span></div>
                    <div class="cart-row"><span>Color: ${escapeHtml(item.descripcion || "-")}</span></div>
                    <div class="cart-row"><span>Term: ${escapeHtml(item.terminacion)} | Pres: ${escapeHtml(item.presentacion)} | Prio: ${escapeHtml(item.prioridad || "Media")}</span></div>
                    <div class="cart-row"><span>Base: ${escapeHtml(item.base || "-")} | Ubicacion: ${escapeHtml(item.ubicacion || "-")}</span></div>
                    <div class="cart-row">
                        <span class="qty">
                            <button type="button" onclick="updateQty(${idx}, -1)">-</button>
                            <span>${Number(item.cantidad || 1)}</span>
                            <button type="button" onclick="updateQty(${idx}, 1)">+</button>
                        </span>
                        <button class="btn subtle" type="button" onclick="removeItem(${idx})">Quitar</button>
                    </div>
                </div>
            `).join("");

            updateCartTotal();
        }

        function updateQty(index, delta) {
            const item = state.cart[index];
            if (!item) return;
            item.cantidad = Math.max(1, Number(item.cantidad || 1) + delta);
            renderCart();
        }

        function removeItem(index) {
            state.cart.splice(index, 1);
            renderCart();
        }

        function clearCart() {
            state.cart.length = 0;
            renderCart();
            setStatus("Carrito limpio", "info");
        }

        async function loadColorList() {
            const query = (document.getElementById("kioskQuery").value || "").trim();
            const requestToken = Date.now();
            state.latestColorSearchToken = requestToken;

            const applySherwinFallback = async () => {
                state.colorSearchPending = true;
                renderColors();
                const sherwinResults = await searchSherwinColors(query);
                if (requestToken !== state.latestColorSearchToken) return false;
                state.colorSearchPending = false;
                if (sherwinResults.length) {
                    state.colors = sherwinResults;
                    renderColors();
                    setStatus("Colores cargados desde Sherwin", "ok");
                    return true;
                }
                renderColors();
                return false;
            };

            if (state.allColors.length) {
                await applyFilterWithSherwinFallback(query);
                return;
            }

            const params = new URLSearchParams();
            params.set("limit", String(PRODUCTS_FETCH_LIMIT));

            setStatus("Cargando colores...", "info");
            try {
                const res = await fetch(`${API}/api/v1/labelsapp/products?${params.toString()}`);
                if (!res.ok) throw new Error("No se pudieron cargar colores");
                const data = await res.json();
                if (requestToken !== state.latestColorSearchToken) return;
                state.allColors = (Array.isArray(data.productos) ? data.productos : []).map((item) => ({
                    ...item,
                    searchText: [item && item.codigo, item && item.nombre, item && item.base, item && item.ubicacion]
                        .map(normalizeText)
                        .join(" ")
                }));
                applyLocalColorFilter(query, {
                    suppressEmptyState: Boolean(query),
                    requestToken
                });
                if (query && !state.colors.length) {
                    await applySherwinFallback();
                } else {
                    state.colorSearchPending = false;
                    renderColors();
                }
                setStatus("", "ok");
            } catch (err) {
                if (requestToken !== state.latestColorSearchToken) return;
                state.colorSearchPending = false;
                const usedFallback = await applySherwinFallback();
                if (!usedFallback) {
                    renderColors();
                    setStatus(err.message || "Error cargando colores", "err");
                }
            }
        }

        async function loadCatalog() {
            try {
                const res = await fetch(`${API}/api/v1/productos/catalog`);
                if (!res.ok) throw new Error("catalog failed");
                const payload = await res.json();
                const productos = Array.isArray(payload.productos) ? payload.productos : [];
                const merged = productos.map(item => {
                    const apiDescription = String((item && item.description) || "").trim();
                    const fallbackDescription = getFallbackDescriptionFor(item && item.name);
                    const fallbackMeta = getFallbackMetaFor(item && item.name) || {};
                    return {
                        ...item,
                        name: getDisplayProductName(item && item.name),
                        description: fallbackDescription || apiDescription || "Producto disponible",
                        coverage: String((item && item.coverage) || "").trim() || fallbackMeta.coverage || "No especificada",
                        type: String((item && item.type) || "").trim() || fallbackMeta.type || "No especificado"
                    };
                });
                state.catalog = merged.length ? merged : PRODUCT_FALLBACK;
            } catch (_) {
                state.catalog = PRODUCT_FALLBACK;
            }
            state.selectedCatalogIndex = 0;
            renderCatalog();
        }

        function buildPayload() {
            const sucursal = getSucursal();
            const role = String((state.currentUser && state.currentUser.rol) || "").toLowerCase();
            const usernameKey = String((state.currentUser && state.currentUser.username) || "").toLowerCase();
            const cliente = (document.getElementById("checkoutCliente").value || "").trim();
            const idFactura = makeFacturaId(cliente);
            const prioridadGlobal = String((state.cart[0] && state.cart[0].prioridad) || "Media");

            return {
                id_factura: idFactura,
                id_cliente: cliente || null,
                prioridad: prioridadGlobal,
                sucursal: (role === "cliente" || usernameKey === "cliente") ? null : (sucursal || "principal"),
                username: state.currentUser ? (state.currentUser.username || null) : null,
                usuario_id: state.currentUser ? Number(state.currentUser.id || 0) || null : null,
                operador: "kiosk_touch",
                items: state.cart.map(i => ({
                    codigo: i.codigo,
                    descripcion: i.descripcion || i.codigo || "",
                    producto: i.producto || "Producto",
                    terminacion: i.terminacion || "Mate",
                    presentacion: i.presentacion || "Galon",
                    prioridad: i.prioridad || prioridadGlobal,
                    cantidad: Number(i.cantidad || 1),
                    base: i.base || "",
                    ubicacion: i.ubicacion || ""
                }))
            };
        }

        async function sendCart() {
            if (!state.cart.length) {
                setStatus("Agrega productos antes de enviar", "err");
                return;
            }

            closeCartDrawer();
            openCheckoutModal();
        }

        async function confirmCheckoutSend() {
            closeCheckoutModal();
            const payload = buildPayload();
            setStatus("Enviando pedido...", "info");
            try {
                const res = await fetch(`${API}/api/v1/labelsapp/send`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const body = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(body.detail || "No se pudo enviar el pedido");
                clearCart();
                setStatus(`Pedido enviado: ${body.id_factura || payload.id_factura}`, "ok");
            } catch (err) {
                setStatus(err.message || "Error enviando pedido", "err");
            }
        }

        async function loadSherwinLocalCatalog() {
            try {
                const res = await fetch(`${API}/api/v1/sherwin/catalog`);
                if (!res.ok) return;
                const data = await res.json();
                const colors = Array.isArray(data && data.colors) ? data.colors : [];
                if (!colors.length) return;

                const existingByCode = new Set();
                for (const item of state.allColors) {
                    const c = extractSwCode(item && item.codigo);
                    if (c) existingByCode.add(c);
                }

                const additions = [];
                for (const c of colors) {
                    const rawCode = String((c && c.code) || "").trim();
                    if (!rawCode) continue;
                    const codeKey = rawCode.toUpperCase().replace(/[^0-9A-Z]/g, "");
                    if (!codeKey || existingByCode.has(codeKey)) continue;
                    const codigo = `SW ${codeKey}`;
                    const nombre = String((c && c.name) || `SW ${codeKey}`).trim();
                    const hex = normalizeHex((c && c.hex) || "");
                    const families = Array.isArray(c && c.families) ? c.families.filter(Boolean) : [];
                    const item = {
                        codigo,
                        nombre,
                        base: "",
                        ubicacion: "",
                        personalizado: false,
                        sherwin: true,
                        hex,
                        colorFamilyNames: families,
                    };
                    item.searchText = [codigo, nombre, ...families]
                        .map(normalizeText)
                        .join(" ");
                    additions.push(item);
                    existingByCode.add(codeKey);
                    state.colorByCode[codeKey] = { name: nombre, hex };
                }

                if (additions.length) {
                    state.allColors = state.allColors.concat(additions);
                    const currentQuery = (document.getElementById("kioskQuery").value || "").trim();
                    applyLocalColorFilter(currentQuery, { suppressEmptyState: Boolean(currentQuery) });
                }
            } catch (_) {
                // silencioso: si falla, seguimos con el flujo normal
            }
        }

        let debounceTimer = null;
        let lastQuery = "";

        document.getElementById("kioskQuery").addEventListener("keydown", (ev) => {
            if (ev.key === "Enter") {
                ev.preventDefault();
                if (debounceTimer) clearTimeout(debounceTimer);
                debounceTimer = null;
                const value = String((ev.target && ev.target.value) || "").trim();
                if (state.allColors.length) {
                    applyLocalColorFilter(value);
                } else {
                    loadColorList();
                }
            }
        });

        document.getElementById("kioskQuery").addEventListener("input", (ev) => {
            const value = String((ev.target && ev.target.value) || "").trim();
            if (value === lastQuery) return;
            lastQuery = value;

            if (debounceTimer) {
                clearTimeout(debounceTimer);
                debounceTimer = null;
            }

            if (!value) {
                if (state.allColors.length) {
                    applyLocalColorFilter("");
                } else {
                    loadColorList();
                }
                return;
            }

            debounceTimer = setTimeout(() => {
                if (state.allColors.length) {
                    applyFilterWithSherwinFallback(value);
                } else {
                    loadColorList();
                }
                debounceTimer = null;
            }, 300);
        });

        document.getElementById("checkoutSucursal").addEventListener("input", refreshSessionPills);

        document.addEventListener("keydown", (ev) => {
            if (ev.key === "Escape") {
                closeCartDrawer();
            }
        });

        (async () => {
            const canContinue = await initSessionContext();
            if (!canContinue) return;
            setFlowStep("color");
            renderColors();
            renderCart();
            await Promise.all([
                loadCatalog(),
                (async () => {
                    await loadColorList();
                    await loadSherwinLocalCatalog();
                })()
            ]);
        })();

        /* ================================================================
         * "Ver en pared": vista previa del color seleccionado sobre fotos
         * reales. Las máscaras se generan offline con tools/build_wall_masks.py
         * y se publican en /static/escenas/. El blend "color" del canvas
         * conserva las sombras y luces de la pared real.
         * ================================================================ */
        const wallPreviewState = {
            scenes: [],
            loaded: false,
            loading: null,
            activeId: null,
            baseImg: null,
            maskImg: null,
        };

        async function _loadWallManifest() {
            if (wallPreviewState.loaded) return wallPreviewState.scenes;
            if (wallPreviewState.loading) return wallPreviewState.loading;
            wallPreviewState.loading = (async () => {
                try {
                    const res = await fetch("/static/escenas/manifest.json", { cache: "no-store" });
                    if (!res.ok) throw new Error("manifest no disponible");
                    const data = await res.json();
                    wallPreviewState.scenes = Array.isArray(data && data.scenes) ? data.scenes : [];
                } catch (_) {
                    wallPreviewState.scenes = [];
                }
                wallPreviewState.loaded = true;
                return wallPreviewState.scenes;
            })();
            return wallPreviewState.loading;
        }

        function _loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("No pude cargar " + src));
                img.src = src;
            });
        }

        function _selectedColorForPreview() {
            const idx = state.selectedColorIndex;
            if (idx < 0 || idx >= state.colors.length) return null;
            const c = state.colors[idx] || {};
            const hex = resolveColorHex(c);
            if (!hex) return null;
            return {
                hex,
                code: String(c.codigo || c.code || ""),
                name: String(c.nombre || c.name || ""),
            };
        }

        async function openWallPreview() {
            const overlay = document.getElementById("wallPreviewOverlay");
            const empty = document.getElementById("wallCanvasEmpty");
            if (!overlay) return;

            const color = _selectedColorForPreview();
            if (!color) {
                setStatus("Selecciona un color primero.", "warn");
                return;
            }

            // Actualizar chip de color en el header.
            const swatch = document.getElementById("wallPreviewSwatch");
            const label = document.getElementById("wallPreviewLabel");
            if (swatch) swatch.style.background = color.hex;
            if (label) label.textContent = [color.code, color.name].filter(Boolean).join(" · ") || color.hex;

            overlay.classList.add("is-open");
            if (empty) {
                empty.style.display = "flex";
                empty.textContent = "Cargando escenas…";
            }

            const scenes = await _loadWallManifest();
            if (!scenes.length) {
                if (empty) {
                    empty.style.display = "flex";
                    empty.innerHTML = "Aún no hay escenas configuradas.<br>" +
                        "El administrador puede agregarlas siguiendo " +
                        "<code>tools/README_escenas.md</code>.";
                }
                _renderScenePicker([]);
                return;
            }

            _renderScenePicker(scenes);
            const initial = wallPreviewState.activeId && scenes.find(s => s.id === wallPreviewState.activeId)
                ? wallPreviewState.activeId
                : scenes[0].id;
            await _activateScene(initial);
        }

        function closeWallPreview(ev) {
            if (ev && ev.target && ev.target.id !== "wallPreviewOverlay" && ev.type === "click") return;
            const overlay = document.getElementById("wallPreviewOverlay");
            if (overlay) overlay.classList.remove("is-open");
        }

        function _renderScenePicker(scenes) {
            const picker = document.getElementById("wallScenePicker");
            if (!picker) return;
            picker.innerHTML = "";
            scenes.forEach(scene => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "wall-scene-btn" + (scene.id === wallPreviewState.activeId ? " is-active" : "");
                btn.innerHTML = `
                    <img src="${escapeHtml(scene.base)}" alt="${escapeHtml(scene.label || scene.id)}" loading="lazy" />
                    <span class="label">${escapeHtml(scene.label || scene.id)}</span>
                `;
                btn.onclick = () => _activateScene(scene.id);
                picker.appendChild(btn);
            });
        }

        async function _activateScene(sceneId) {
            const scene = wallPreviewState.scenes.find(s => s.id === sceneId);
            if (!scene) return;
            wallPreviewState.activeId = sceneId;
            // Actualizar estilo activo en el picker.
            const picker = document.getElementById("wallScenePicker");
            if (picker) {
                Array.from(picker.children).forEach((el, i) => {
                    el.classList.toggle("is-active", wallPreviewState.scenes[i] && wallPreviewState.scenes[i].id === sceneId);
                });
            }

            const empty = document.getElementById("wallCanvasEmpty");
            if (empty) {
                empty.style.display = "flex";
                empty.textContent = "Cargando escena…";
            }

            try {
                const [baseImg, maskImg] = await Promise.all([
                    _loadImage(scene.base),
                    _loadImage(scene.mask_paredes),
                ]);
                wallPreviewState.baseImg = baseImg;
                wallPreviewState.maskImg = maskImg;
                if (empty) empty.style.display = "none";
                _paintWall();
            } catch (e) {
                if (empty) {
                    empty.style.display = "flex";
                    empty.textContent = "No pude cargar la escena (" + e.message + ").";
                }
            }
        }

        function _paintWall() {
            const canvas = document.getElementById("wallCanvas");
            const base = wallPreviewState.baseImg;
            const mask = wallPreviewState.maskImg;
            if (!canvas || !base || !mask) return;
            const color = _selectedColorForPreview();
            if (!color) return;

            const w = base.naturalWidth || base.width;
            const h = base.naturalHeight || base.height;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");

            // 1. Foto base.
            ctx.globalCompositeOperation = "source-over";
            ctx.drawImage(base, 0, 0, w, h);

            // 2. Capa offscreen: color sólido recortado por la máscara (alpha).
            const off = document.createElement("canvas");
            off.width = w;
            off.height = h;
            const offCtx = off.getContext("2d");
            offCtx.fillStyle = color.hex;
            offCtx.fillRect(0, 0, w, h);
            offCtx.globalCompositeOperation = "destination-in";
            offCtx.drawImage(mask, 0, 0, w, h);

            // 3. Aplicar con blend "color": conserva luminancia/sombras de la pared real
            //    y toma el hue+saturación del color elegido. Es lo que hace Sherwin.
            ctx.globalCompositeOperation = "color";
            ctx.drawImage(off, 0, 0);
            ctx.globalCompositeOperation = "source-over";
        }

        function downloadWallPreview() {
            const canvas = document.getElementById("wallCanvas");
            if (!canvas || !canvas.width) return;
            const color = _selectedColorForPreview();
            const slug = (wallPreviewState.activeId || "vista")
                + (color ? "_" + (color.code || color.hex.replace("#", "")) : "");
            const link = document.createElement("a");
            link.download = `paintflow_${slug}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
